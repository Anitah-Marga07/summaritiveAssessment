<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Base page styling to match the background tone and center alignment */
      body {
        background-color: #f3f5f7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      /* Container matching the clean width and constraints from the design */
      .login-wrapper {
        width: 100%;
        max-width: 480px;
        padding: 20px;
      }

      /* Large minimalist header spacing */
      .form-heading {
        font-size: 2.35rem;
        color: #000000;
        margin-bottom: 30px;
        text-align: center;
        font-weight: 400;
      }

      /* Input field customizations to override default roundings and colors */
      .custom-input {
        border: 1px solid #5bc0be !important;
        border-radius: 0px !important; /* Forces strict rectangular corners */
        padding: 13px 16px !important;
        font-size: 1.05rem;
        color: #212529;
        background-color: #ffffff;
      }

      /* Italicized muted placeholder state matching image precisely */
      .custom-input::placeholder {
        color: #7a828a;
        font-style: italic;
        opacity: 1;
      }

      /* Sharp focus ring removal to preserve layout aesthetic */
      .custom-input:focus {
        box-shadow: none !important;
        border-color: #5bc0be !important;
        outline: none;
      }

      /* Exact teal tone button with flat design requirements */
      .btn-custom-login {
        background-color: #5bc0be !important;
        color: #ffffff !important;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border: none !important;
        border-radius: 4px !important;
        padding: 12px 0 !important;
        transition: background-color 0.2s ease-in-out; /* Smooth color transition */
      }

      /* Changes background color to the design's specific purple on hover */
      .btn-custom-login:hover {
        background-color: #5c375c !important;
        color: #ffffff !important;
      }

      /* Custom spacing and subtle contrast for footer redirect text */
      .redirect-footer {
        margin-top: 18px;
        font-size: 0.92rem;
        color: #72777a;
        text-align: center;
      }

      .redirect-footer a {
        color: #337ab7;
        text-decoration: none;
      }

      .redirect-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <h1 class="form-heading">Login</h1>

      <form autocomplete="off">
        <div class="mb-3">
          <input
            type="text"
            class="form-control custom-input"
            id="loginIdentifier"
            placeholder="Email or Phone Number"
          />
        </div>

        <div class="mb-4">
          <input
            type="password"
            class="form-control custom-input"
            id="password"
            placeholder="Password"
          />
        </div>

        <button type="submit" class="btn btn-custom-login w-100">Login</button>
      </form>

      <div class="redirect-footer">
        Don’t have an account? - <a href="signup.html">Signup</a>
      </div>
    </div>
  </body>
</html>
